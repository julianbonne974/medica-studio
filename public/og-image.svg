    <text x="140" y="448" font-size="24" font-weight="400" fill="#a7f3d0" opacity="0.9">HDS · Conformité RGPD · HAS 2025 · CaRE · HDS 2.0</text>
    <text x="140" y="530" font-size="20" font-weight="400" fill="#ecfdf5" opacity="0.85">Next.js · tRPC · PostgreSQL · Firebase · Flutter · publicodes</text>
