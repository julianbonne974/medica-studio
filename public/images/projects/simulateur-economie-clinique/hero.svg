<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Simulateur d'économie clinique">
  <defs>
    <linearGradient id="eco-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e2b"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <pattern id="eco-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#eco-bg)"/>
  <rect width="1200" height="630" fill="url(#eco-grid)"/>
  <g transform="translate(600 250)" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- bâtiment clinique -->
    <rect x="-150" y="-70" width="120" height="150" fill="#ffffff" fill-opacity="0.10"/>
    <line x1="-120" y1="-40" x2="-60" y2="-40"/>
    <line x1="-120" y1="0" x2="-60" y2="0"/>
    <line x1="-120" y1="40" x2="-60" y2="40"/>
    <!-- croix santé -->
    <line x1="-90" y1="-110" x2="-90" y2="-86"/>
    <line x1="-102" y1="-98" x2="-78" y2="-98"/>
    <!-- courbe P&L montante -->
    <polyline points="-10,70 50,20 100,40 160,-50" stroke="#10b981"/>
    <path d="M160 -50 L138 -44 L150 -28 Z" fill="#10b981" fill-opacity="0.5" stroke="none"/>
    <!-- barres comparatives -->
    <rect x="0" y="50" width="26" height="30" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
    <rect x="44" y="20" width="26" height="60" fill="#a7f3d0" fill-opacity="0.35" stroke="none"/>
  </g>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#ffffff" text-anchor="middle">
    <text x="600" y="470" font-size="54" font-weight="700" letter-spacing="-1">Simulateur d'économie clinique</text>
    <text x="600" y="518" font-size="22" font-weight="400" fill="#a7f3d0" opacity="0.9">P&amp;L salariat vs libéral · 16 spécialités MCO · GHS</text>
  </g>
</svg>
