<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Passerelle IA souveraine">
  <defs>
    <linearGradient id="ia-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <pattern id="ia-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#ia-bg)"/>
  <rect width="1200" height="630" fill="url(#ia-grid)"/>
  <g transform="translate(600 250)" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- bouclier souveraineté -->
    <path d="M0 -110 L95 -75 V5 C95 60 50 95 0 115 C-50 95 -95 60 -95 5 V-75 Z" fill="#ffffff" fill-opacity="0.08"/>
    <!-- noeud IA central -->
    <circle cx="0" cy="-10" r="22" fill="#22d3ee" fill-opacity="0.25"/>
    <!-- liens réseau -->
    <line x1="0" y1="-10" x2="-55" y2="-55"/>
    <line x1="0" y1="-10" x2="55" y2="-55"/>
    <line x1="0" y1="-10" x2="-55" y2="45"/>
    <line x1="0" y1="-10" x2="55" y2="45"/>
    <circle cx="-55" cy="-55" r="9" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="55" cy="-55" r="9" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="-55" cy="45" r="9" fill="#67e8f9" fill-opacity="0.7"/>
    <circle cx="55" cy="45" r="9" fill="#67e8f9" fill-opacity="0.7"/>
    <!-- check validation -->
    <polyline points="-14,-12 -3,0 16,-22" stroke="#34d399"/>
  </g>
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#ffffff" text-anchor="middle">
    <text x="600" y="470" font-size="54" font-weight="700" letter-spacing="-1">Passerelle IA souveraine</text>
    <text x="600" y="518" font-size="22" font-weight="400" fill="#a5f3fc" opacity="0.9">Mistral · HDS · OCR hybride · validation humaine</text>
  </g>
</svg>
